<!DOCTYPE html>
<html>

<head>

    <title>Algoritmos de Búsqueda</title>

    <style>

        body{

            background:#0f172a;
            font-family:Arial;
            color:white;
            text-align:center;
            padding:40px;
        }

        .contenedor{

            width:900px;
            margin:auto;
        }

        .formulario{

            background:#1e293b;
            padding:30px;
            border-radius:15px;
        }

        input{

            width:100%;
            padding:12px;
            margin-top:10px;
            border:none;
            border-radius:10px;
        }

        button{

            width:100%;
            padding:12px;
            margin-top:15px;
            border:none;
            border-radius:10px;
            background:#38bdf8;
            color:white;
            font-size:16px;
        }

        .grid{

            display:grid;
            grid-template-columns:1fr 1fr 1fr;
            gap:20px;
            margin-top:30px;
        }

        .card{

            background:#1e293b;
            padding:20px;
            border-radius:15px;
        }

        .titulo{

            font-size:22px;
            margin-bottom:15px;
            color:#38bdf8;
        }

        .resultado{

            background:#334155;
            padding:15px;
            border-radius:10px;
            word-wrap:break-word;
        }

        .error{

            color:#f87171;
            margin-top:20px;
        }

    </style>

</head>

<body>

<div class="contenedor">

    <div class="formulario">

        <h1>Algoritmos de Búsqueda</h1>

        <form method="POST">

            {% csrf_token %}

            <input
                type="text"
                name="estado_inicial"
                placeholder="Estado inicial Ej: 4,2,3,1"
                required
            >

            <input
                type="text"
                name="estado_final"
                placeholder="Estado final Ej: 1,2,3,4"
                required
            >

            <button type="submit">

                Resolver

            </button>

        </form>

        {% if error %}

            <div class="error">

                {{ error }}

            </div>

        {% endif %}

    </div>

    <div class="grid">

        <div class="card">

            <div class="titulo">

                Búsqueda en Amplitud

            </div>

            <div class="resultado">

                {{ bfs_resultado }}

            </div>

        </div>

        <div class="card">

            <div class="titulo">

                Búsqueda en Profundidad

            </div>

            <div class="resultado">

                {{ dfs_resultado }}

            </div>

        </div>

        <div class="card">

            <div class="titulo">

                Búsqueda Recursiva

            </div>

            <div class="resultado">

                {{ rec_resultado }}

            </div>

        </div>

    </div>

</div>

</body>
</html>
